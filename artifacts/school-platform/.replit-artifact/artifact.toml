kind = "web"
previewPath = "/"
title = "School Management Platform"
version = "1.0.0"
id = "artifacts/school-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23573

[services.development]
run = "pnpm --filter @workspace/school-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-platform", "run", "build" ]
publicDir = "artifacts/school-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23573"
BASE_PATH = "/"
